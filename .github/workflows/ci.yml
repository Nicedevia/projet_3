name: CI/CD - Test, Retrain, Build & Monitor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permet un lancement manuel

jobs:

  # --- 🧪 Étape 1 : Tests Unitaire et Validation ---
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Cloner le repo
      uses: actions/checkout@v3

    - name: 🛠 Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 🔎 Vérifier la version de Python et de pip
      run: |
        python --version
        pip --version

    - name: 📦 Installer TensorFlow en priorité
      run: |
        pip install --upgrade pip
        pip install tensorflow==2.18.0

    - name: 📦 Installer les dépendances
      run: |
        pip install --no-cache-dir -r requirements.txt
        pip install pytest coverage

    - name: 💤 Pause de 30 s pour debug
      run: sleep 30 

    - name: 📥 Télécharger l'artefact du modèle
      uses: actions/download-artifact@v4
      with:
        name: retrained_model
        path: models/

    - name: 🧐 Vérifier si le modèle téléchargé existe
      run: ls -lh models/ || echo "❌ Modèle non trouvé après téléchargement."

    - name: 📊 Vérification spécifique de fusion.h5
      run: |
        if [ -f models/fusion.h5 ]; then
          echo "✅ fusion.h5 trouvé et prêt à être utilisé."
        else
          echo "❌ ERREUR: fusion.h5 introuvable !"
          exit 1
        fi

    - name: 🚀 Exécuter les tests avec Timeout
      run: |
        timeout 300 pytest --maxfail=1 --disable-warnings -q || echo "❌ Timeout atteint !"

    - name: 📊 Générer le rapport de couverture
      run: |
        coverage run --source=projet_3 --omit="*/tmp/*" -m pytest
        coverage report -m

  # --- 🔥 Étape 2 : Réentraînement du modèle ---
  retrain:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Cloner le repo
      uses: actions/checkout@v3

    - name: 🔧 Installer TensorFlow en priorité
      run: |
        pip install --upgrade pip
        pip install tensorflow==2.18.0

    - name: 📦 Installer les dépendances
      run: |
        pip install --no-cache-dir -r requirements.txt

    - name: 🔥 Réentraîner le modèle IA
      run: |
        python scripts/retrainmapping.py

    - name: 🔎 Vérifier que le modèle a été généré
      run: |
        ls -lh models/ || echo "❌ Le dossier models/ est vide !"
        
        if [ -f models/fusion.h5 ]; then
          echo "✅ fusion.h5 est bien présent."
        else
          echo "❌ ERREUR: fusion.h5 introuvable !"
          exit 1
        fi

    - name: 📤 Sauvegarder le modèle entraîné
      uses: actions/upload-artifact@v4
      with:
        name: retrained_model
        path: models/  # On enregistre tout le dossier pour éviter les erreurs de fichier unique

  # --- 🐳 Étape 3 : Build & Push Docker ---
  build_and_push:
    needs: retrain
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Cloner le repo
      uses: actions/checkout@v3

    - name: 📜 Télécharger l'artefact du modèle
      uses: actions/download-artifact@v4
      with:
        name: retrained_model
        path: models/

    - name: 🔎 Vérification de fusion.h5 après téléchargement
      run: |
        if [ -f models/fusion.h5 ]; then
          echo "✅ fusion.h5 trouvé après téléchargement."
        else
          echo "❌ ERREUR: fusion.h5 introuvable après téléchargement !"
          exit 1
        fi

    - name: 🛠 Construire l’image Docker
      run: |
        docker build -t ia-api:latest .

    - name: 📜 Vérifier les images Docker avant le push
      run: docker images

    - name: 📤 Connexion à DockerHub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: 📤 Pousser l’image vers DockerHub
      run: |
        docker tag ia-api:latest intdpixel/ia-api:latest
        docker push intdpixel/ia-api:latest

  # --- 📊 Étape 4 : Monitorage avec Prometheus ---
  monitor:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
    - name: 🚀 Démarrer le conteneur Docker
      run: |
        docker run -d -p 8000:8000 -p 9090:9090 intdpixel/ia-api:latest
        sleep 10  

    - name: 🔍 Vérifier les services en cours
      run: |
        docker ps -a
        netstat -tulnp

    - name: 📊 Vérifier Prometheus
      run: |
        wget -S http://localhost:9090/metrics || echo "❌ Prometheus ne répond pas"
